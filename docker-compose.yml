version: '3.8'

services:
  # 前端服务 (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8000/api
      - NEXT_PUBLIC_WEBSOCKET_URL=http://api-gateway:8000
    depends_on:
      - api-gateway
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # API网关服务 (FastAPI)
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_URL=sqlite:///./app.db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in your local .env file}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - AI_SERVICE_URL=http://ai-service:8001
      - EDA_SERVICE_URL=http://eda-service:8002
    depends_on:
      - redis
      - ai-service
      - eda-service
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    restart: unless-stopped

  # AI电路设计服务 (Python)
  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=/app/models/circuit_bert
    depends_on:
      - redis
    volumes:
      - ./ai_service:/app
      - ./storage/models:/app/models
    restart: unless-stopped

  # EDA工具服务 (Python)
  eda-service:
    build:
      context: ./eda_tools
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/app/storage
    depends_on:
      - redis
    volumes:
      - ./eda_tools:/app
      - ./storage:/app/storage
    restart: unless-stopped

  # Redis消息队列和缓存服务
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Celery Worker服务 (用于异步任务处理)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    environment:
      - DB_URL=sqlite:///./app.db
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8001
      - EDA_SERVICE_URL=http://eda-service:8002
    depends_on:
      - redis
      - api-gateway
      - ai-service
      - eda-service
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    restart: unless-stopped

  # Celery Beat服务 (用于定时任务)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      - DB_URL=sqlite:///./app.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - api-gateway
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
