openapi: 3.0.0
info:
  title: AI Circuit Design Parser API
  description: Converts natural language circuit design requests into structured circuit data
  version: 1.0.0
paths:
  /api/ai/parse:
    post:
      summary: Parse natural language circuit design request
      description: Analyzes natural language input and returns structured circuit design data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input_text:
                  type: string
                  description: Natural language circuit design request
                  example: "设计一个使用Arduino UNO的LED闪烁电路，电阻220欧，LED红色"
              required:
                - input_text
      responses:
        '200':
          description: Successfully parsed circuit design
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircuitDesign'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ai/models:
    get:
      summary: Get available AI models
      description: Returns a list of available AI models for circuit design parsing
      responses:
        '200':
          description: Successfully retrieved models
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      type: string
                    example: ["CircuitBERT", "CodeLlama-7B", "TemplateMatch"]
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ai/health:
    get:
      summary: Check API health
      description: Returns the health status of the AI parsing service
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2023-10-05T14:48:00.000Z"

components:
  schemas:
    CircuitDesign:
      type: object
      properties:
        components:
          type: array
          items:
            $ref: '#/components/schemas/CircuitComponent'
        connections:
          type: array
          items:
            $ref: '#/components/schemas/CircuitConnection'
        constraints:
          $ref: '#/components/schemas/CircuitConstraints'
      required:
        - components
        - connections
        - constraints

    CircuitComponent:
      type: object
      properties:
        type:
          type: string
          description: Component type
          example: "microcontroller"
        model:
          type: string
          description: Component model (if applicable)
          example: "Arduino UNO"
        value:
          type: string
          description: Component value (if applicable)
          example: "220Ω"
        footprint:
          type: string
          description: Component footprint (if applicable)
          example: "0805"
        color:
          type: string
          description: Component color (if applicable)
          example: "red"
        forward_voltage:
          type: string
          description: Forward voltage (if applicable)
          example: "2.0V"
        pins:
          type: array
          items:
            $ref: '#/components/schemas/ComponentPin'
      required:
        - type

    ComponentPin:
      type: object
      properties:
        name:
          type: string
          description: Pin name
          example: "D13"
        number:
          type: integer
          description: Pin number
          example: 13
        function:
          type: string
          description: Pin function
          example: "digital_output"

    CircuitConnection:
      type: object
      properties:
        from:
          type: string
          description: Source component and pin
          example: "Arduino.D13"
        to:
          type: string
          description: Destination component and pin
          example: "R1.1"
      required:
        - from
        - to

    CircuitConstraints:
      type: object
      properties:
        voltage:
          type: string
          description: Power supply voltage
          example: "5V"
        current_limit:
          type: string
          description: Maximum current
          example: "20mA"
        frequency:
          type: string
          description: Operating frequency (if applicable)
          example: "1Hz"
        temperature_range:
          type: string
          description: Operating temperature range (if applicable)
          example: "-20°C to 70°C"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Invalid input format"
        code:
          type: integer
          description: Error code
          example: 400
        details:
          type: string
          description: Additional error details (if applicable)
          example: "Input text must be a non-empty string"
