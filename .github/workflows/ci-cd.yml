name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_COMPOSE_VERSION: '2.17.3'
  AWS_REGION: 'us-east-1'
  GCP_PROJECT: 'your-gcp-project-id'

jobs:
  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # 前端代码检查
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
      
      - name: Run Prettier check
        working-directory: ./frontend
        run: npm run prettier:check

  # 构建测试
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      
      # 设置Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # 构建所有Docker镜像
      - name: Build Docker images
        run: docker compose build

  # 部署到云服务
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      # AWS部署选项
      - name: Deploy to AWS EC2
        if: env.DEPLOY_TARGET == 'aws'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_EC2_KEY }}
          script: |
            cd /home/ubuntu/cirgpt
            git pull origin main
            docker compose down
            docker compose up -d --build
      
      # GCP部署选项
      - name: Deploy to GCP Compute Engine
        if: env.DEPLOY_TARGET == 'gcp'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_KEY }}
          script: |
            cd /home/${{ secrets.GCP_USERNAME }}/cirgpt
            git pull origin main
            docker compose down
            docker compose up -d --build
      
      # GCP Cloud Run部署选项
      - name: Deploy to GCP Cloud Run
        if: env.DEPLOY_TARGET == 'gcp-cloud-run'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: cirgpt-api
          region: us-central1
          source: .
          credentials: ${{ secrets.GCP_SA_KEY }}

  # 健康检查
  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check frontend health
        run: curl -f http://${{ secrets.DEPLOYED_HOST }}:3000 || exit 1
      
      - name: Check backend health
        run: curl -f http://${{ secrets.DEPLOYED_HOST }}:8000/api/health || exit 1
      
      - name: Check AI service health
        run: curl -f http://${{ secrets.DEPLOYED_HOST }}:8001/api/ai/health || exit 1
      
      - name: Check EDA service health
        run: curl -f http://${{ secrets.DEPLOYED_HOST }}:8002/api/eda/health || exit 1
